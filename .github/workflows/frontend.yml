name: Build and Deploy Angular (GitHub Pages)

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci
        working-directory: PlannedAngular/PlannedProjClient

      - name: Build (Angular)
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: npm run build --prefix PlannedAngular/PlannedProjClient

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./PlannedAngular/PlannedProjClient/dist/PlannedProjClient
