name: Build and Publish .NET Backend

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore PlannedNet/PlannedNet/PlannedNet.csproj

      - name: Build
        run: dotnet build --configuration Release PlannedNet/PlannedNet/PlannedNet.csproj

      - name: Test
        run: dotnet test --configuration Release PlannedNet/PlannedProj.Tests/PlannedProj.Tests.csproj

      - name: Publish
        run: dotnet publish PlannedNet/PlannedNet/PlannedNet.csproj --configuration Release --output ./publish

      # Optional deploy to Azure Web App (uncomment and set AZURE_WEBAPP_PUBLISH_PROFILE secret)
      #- name: Deploy to Azure Web App
      #  uses: azure/webapps-deploy@v2
      #  with:
      #    app-name: <YOUR_AZURE_APP_NAME>
      #    publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
      #    package: ./publish
